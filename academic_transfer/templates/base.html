<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Автоматизация процессов перевода и восстановления студентов ЯГТУ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #eef2f7;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }
        
        .header {
            background: #1a5276;
            color: white;
            padding: 24px 30px;
            text-align: center;
            border-bottom: 3px solid #2980b9;
        }
        
        .header h1 {
            font-size: 1.8em;
            font-weight: 500;
            margin-bottom: 8px;
        }
        
        .header p {
            font-size: 0.95em;
            opacity: 0.85;
        }
        
        .nav {
            background: #2c3e50;
            padding: 12px 30px;
            border-bottom: 1px solid #34495e;
        }
        
        .nav a {
            color: #ecf0f1;
            text-decoration: none;
            margin-right: 24px;
            padding: 6px 12px;
            border-radius: 4px;
            transition: all 0.2s;
            display: inline-block;
            font-size: 14px;
        }
        
        .nav a:hover {
            background: #2980b9;
            color: white;
        }
        
        .content {
            padding: 30px;
            min-height: 500px;
        }
        
        .btn {
            background: #2980b9;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
            display: inline-block;
            text-decoration: none;
            margin: 4px;
        }
        
        .btn:hover {
            background: #1a5276;
        }
        
        .btn-secondary {
            background: #95a5a6;
        }
        
        .btn-secondary:hover {
            background: #7f8c8d;
        }
        
        .alert {
            padding: 12px 16px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        .alert-warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
            font-size: 14px;
        }
        
        th, td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        
        th {
            background: #f5f7fa;
            font-weight: 600;
            color: #2c3e50;
            border-bottom: 2px solid #d0d7e5;
        }
        
        tr:hover {
            background: #f8f9fc;
        }
        
        .status-badge {
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: 500;
            display: inline-block;
        }
        
        .status-success {
            background: #d4edda;
            color: #155724;
        }
        
        .status-warning {
            background: #fff3cd;
            color: #856404;
        }
        
        .status-info {
            background: #d1ecf1;
            color: #0c5460;
        }
        
        select {
            padding: 6px 10px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            font-size: 13px;
            background: white;
        }
        
        .loading {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            z-index: 1000;
            text-align: center;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .spinner {
            border: 3px solid #ecf0f1;
            border-top: 3px solid #2980b9;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        
        .stat-card {
            background: #f8f9fc;
            border: 1px solid #e0e7f0;
            border-radius: 8px;
            padding: 16px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 28px;
            font-weight: 600;
            color: #2c3e50;
        }
        
        .stat-label {
            font-size: 13px;
            color: #7f8c8d;
            margin-top: 4px;
        }
        
        input[type="file"] {
            font-size: 13px;
            padding: 6px;
        }
        
        h2 {
            color: #2c3e50;
            font-weight: 500;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        h3 {
            color: #2c3e50;
            font-weight: 500;
            margin-bottom: 12px;
            font-size: 18px;
        }
        
        hr {
            border: none;
            border-top: 1px solid #e0e7f0;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Автоматизация процессов перевода и восстановления студентов</h1>
            <p>Ярославский государственный технический университет</p>
        </div>
        
        <div class="nav">
            <a href="{{ url_for('index') }}">Главная</a>
            <a href="{{ url_for('upload') }}">Загрузка данных</a>
            {% if session.get('match_results') %}
            <a href="{{ url_for('manual_matching') }}">Ручное сопоставление</a>
            <a href="{{ url_for('results') }}">Результаты</a>
            {% endif %}
            <a href="{{ url_for('reset') }}" onclick="return confirm('Вы уверены? Все данные будут потеряны.')">Начать заново</a>
        </div>
        
        <div class="content">
            {% block content %}{% endblock %}
        </div>
    </div>
    
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Загрузка...</p>
    </div>
    
    <script>
        function showLoading() {
            document.getElementById('loading').style.display = 'block';
        }
        
        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }
        
        function showMessage(message, type) {
            const alertClass = type === 'success' ? 'alert-success' : (type === 'error' ? 'alert-error' : 'alert-info');
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert ${alertClass}`;
            alertDiv.innerHTML = message;
            
            const content = document.querySelector('.content');
            content.insertBefore(alertDiv, content.firstChild);
            
            setTimeout(() => {
                alertDiv.remove();
            }, 5000);
        }
    </script>
</body>
</html>
